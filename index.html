<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采綾遊覽團 | 跟著采綾作伙去遊覽</title>
    <style>
        :root {
            --bg-color: #F5B1AA;
            --banner-pink: #F5B1AA;
            --yarn-pink: #EAC8C1;
            --text-main: #333333;
            --text-header: #4A403D;
            --heart-red: #D0776B;
            --border: rgba(0,0,0,0.05);
            --cancel-grey: #757575;
            --timer-gold: #B8860B;
        }

        * { box-sizing: border-box; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; padding-top: 140px; }

        /* 浮水印與 Header */
        #watermark { position: fixed; top: 20px; right: 20px; z-index: 50; display: flex; align-items: center; gap: 8px; pointer-events: none; opacity: 0.15; }
        .wm-logo { font-size: 24px; }
        .wm-text { font-size: 11px; letter-spacing: 3px; font-weight: bold; color: var(--text-header); text-transform: uppercase; }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 120px;
            background-color: var(--banner-pink); display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: box-shadow 0.4s ease; cursor: pointer;
        }
        header.scrolled { box-shadow: 0 10px 40px rgba(208, 119, 107, 0.25); }
        .banner-img { max-width: 100%; max-height: 100px; object-fit: contain; }

        /* 篩選與搜尋 */
        .filter-bar { max-width: 1400px; margin: 0 auto 10px auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap; }
        .filter-group { display: flex; align-items: center; gap: 8px; flex-grow: 1; min-width: 280px; }
        .search-wrapper { position: relative; flex-grow: 1; display: flex; align-items: center; }
        #search-input { width: 100%; padding: 10px 40px 10px 15px; border-radius: 8px; border: 1px solid var(--yarn-pink); outline: none; font-size: 14px; }
        #clear-search { position: absolute; right: 10px; border: none; background: transparent; color: #bbb; font-size: 18px; cursor: pointer; display: none; }
        .search-count-box { max-width: 1400px; margin: 0 auto 15px auto; padding: 0 20px; font-size: 13px; color: var(--text-header); font-weight: bold; }
        
        #sort-select { padding: 9px 12px; border-radius: 8px; border: 1px solid var(--yarn-pink); background-color: white; font-size: 14px; cursor: pointer; }
        /* 下拉選單中「已取消」的文字顏色 */
        option.cancel-option { color: #999 !important; background: #f9f9f9; }

        .container { max-width: 1400px; margin: 0 auto 30px auto; padding: 0 20px; }
        .section-title { font-size: 20px; font-weight: bold; color: var(--text-header); margin: 20px 0 15px 0; display: flex; align-items: center; gap: 8px; }
        .tour-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 40px; }

        /* 卡片設計 */
        .tour-card {
            background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; transition: transform 0.3s; border: 1px solid var(--border); position: relative;
        }
        .tour-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .tour-img { width: 100%; aspect-ratio: 210 / 297; background-color: #eee; background-size: cover; background-position: center; }
        .tour-info { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .tour-title { font-size: 16px; font-weight: bold; margin: 0 0 10px 0; color: var(--text-header); line-height: 1.4; height: 44px; overflow: hidden; }
        .tour-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 12px; }
        .tour-date { color: #555; font-size: 12px; font-weight: bold; background: #fff; padding: 5px 10px; border-radius: 4px; border: 1px solid #ddd; }
        .seat-badge { font-size: 11px; font-weight: bold; padding: 5px 8px; border-radius: 4px; }
        .seat-plenty { background: #e8f5e9; color: #2e7d32; }
        .seat-few { background: #ffebee; color: #c62828; animation: pulse 2s infinite; }
        .seat-full { background: #eeeeee; color: #757575; }

        .price-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; margin-bottom: 15px; }
        .tour-price { font-size: 24px; color: var(--heart-red); font-weight: bold; }
        .tour-price.cancelled { color: #ccc; text-decoration: line-through; }

        /* iPhone 極簡分享按鈕 */
        .share-btn-ios {
            width: 32px; height: 32px; border: none; background: transparent; cursor: pointer; padding: 0;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .share-btn-ios svg { width: 22px; height: 22px; stroke: var(--text-header); stroke-width: 1.5; fill: none; }
        .share-btn-ios:hover { transform: scale(1.1); opacity: 0.7; }

        /* 截止倒數計時 */
        .deadline-box { font-size: 11px; margin-bottom: 10px; color: var(--timer-gold); font-weight: bold; display: flex; align-items: center; gap: 4px; height: 16px; }
        .deadline-box.expired { color: #bbb; }

        /* 按鈕樣式 */
        .btn-book { width: 100%; padding: 12px; background: var(--heart-red); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-book:hover:not(:disabled) { background: #b06258; }
        
        /* 🌟 優化：已取消按鈕設計 (透明感灰色) */
        .btn-cancelled { 
            background: rgba(0, 0, 0, 0.05) !important; 
            color: rgba(0, 0, 0, 0.3) !important; 
            border: 1px solid rgba(0, 0, 0, 0.08) !important;
            cursor: not-allowed; 
        }

        /* Modal 樣式 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal { background: rgba(255, 255, 255, 0.95); border-radius: 20px; width: 95%; max-width: 600px; height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 20px 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .close-btn { font-size: 32px; cursor: pointer; color: #bbb; background: transparent; border: none; }
        .iframe-container { flex-grow: 1; width: 100%; overflow-y: auto; }
        iframe { width: 100%; height: 100%; border: none; }
        .reminder { background: #fff; padding: 15px 25px; font-size: 14px; text-align: center; border-bottom: 1px dashed var(--yarn-pink); }
        
        .contact-btn-fixed { position: fixed; bottom: 30px; right: 30px; z-index: 1500; padding: 12px 25px; background: var(--heart-red); color: white; border: 2px solid white; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: 0.3s; }
        .contact-modal { background: white; padding: 35px 25px; border-radius: 25px; width: 90%; max-width: 360px; position: relative; text-align: center; }
        .qr-code { width: 200px; height: 200px; background: #f9f9f9; margin: 15px auto; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; }
        .tel-btn { display: block; background: #5CB85C; color: white; text-decoration: none; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 20px; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="watermark"><span class="wm-logo">🧶</span><span class="wm-text">采綾遊覽團</span></div>

    <header id="main-header" onclick="scrollToTop()">
        <img src="banner.png" alt="采綾遊覽團" class="banner-img">
    </header>

    <div class="filter-bar">
        <div class="filter-group">
            <span class="filter-label">🔍 搜尋：</span>
            <div class="search-wrapper">
                <input type="text" id="search-input" placeholder="輸入關鍵字..." oninput="handleSearch()">
                <button type="button" id="clear-search" onclick="clearSearch()">&times;</button>
            </div>
        </div>
        <div class="filter-group" style="justify-content: flex-end;">
            <select id="sort-select" onchange="handleSort()">
                <option value="default">預設排序</option>
                <option value="date-asc">日期 (由近到遠)</option>
                <option value="date-desc">日期 (由遠到近)</option>
                <option value="price-asc">價格 (由低到高)</option>
                <option value="price-desc">價格 (由高到低)</option>
                <option value="seat-asc">尚餘人數 (由少到多)</option>
                <option value="seat-desc">尚餘人數 (由多到少)</option>
                <option value="status">行程狀態 (優先顯示報名中)</option>
                <option value="cancelled-first" class="cancel-option">行程狀態 (已取消)</option>
            </select>
        </div>
    </div>

    <div id="search-count-info" class="search-count-box"></div>

    <div class="container">
        <div id="popular-section-wrapper" style="display:none;">
            <div class="section-title">🔥 熱門推薦 (報名最踴躍)</div>
            <div id="popular-grid" class="tour-grid"></div>
            <hr style="border: 0; border-top: 1px solid var(--yarn-pink); margin-bottom: 30px; opacity: 0.3;">
        </div>
        <div class="section-title">🌟 全部行程</div>
        <div id="tour-grid" class="tour-grid"></div>
    </div>

    <button class="contact-btn-fixed" onclick="openContact()">💬 聯繫采綾</button>

    <div class="modal-overlay" id="contactModal" onclick="closeContact(event)">
        <div class="contact-modal" onclick="event.stopPropagation()">
            <h2 style="margin:0;">聯繫采綾</h2>
            <div class="qr-code"><img src="你的LINE_QR網址" alt="QR" style="width:100%;"></div>
            <p>LINE ID：<b>你的ID</b></p>
            <p>服務專線：<b>0907-317-133</b></p>
            <a href="tel:0907317133" class="tel-btn">📞 直接撥打電話</a>
        </div>
    </div>

    <div class="modal-overlay" id="bookingModal">
        <div class="modal">
            <div class="modal-header">
                <h2 style="margin:0; font-size:18px;">填寫報名資料</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="reminder">✅ 已選擇：<span id="modal-tour-name" style="color:var(--heart-red); font-weight:bold;"></span></div>
            <div class="iframe-container"><iframe id="booking-frame" src=""></iframe></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwqsFuNtiTUWI8C5W_bsFpTkBwT-b9GwExcd_v2ayaUPDjGUBUy2rd5JSZ_tzjebsuaTA/exec';
        let cachedTours = [];
        let currentSearchTerm = '';

        const grid = document.getElementById('tour-grid');
        const popularGrid = document.getElementById('popular-grid');
        const countInfo = document.getElementById('search-count-info');
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-search');

        window.addEventListener('scroll', () => {
            const header = document.getElementById('main-header');
            window.scrollY > 10 ? header.classList.add('scrolled') : header.classList.remove('scrolled');
        });

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

        fetch(API_URL).then(res => res.json()).then(tours => {
            cachedTours = tours;
            renderPopular(tours);
            updateDisplay();
        }).catch(() => grid.innerHTML = '<div style="text-align:center; padding:50px;">連線失敗，請檢查 API。</div>');

        function renderPopular(tours) {
            const popularData = [...tours].filter(t => t.cancel !== '是').sort((a,b) => (parseInt(b.booked)||0)-(parseInt(a.booked)||0)).slice(0, 3);
            if(popularData.length > 0) {
                document.getElementById('popular-section-wrapper').style.display = 'block';
                popularData.forEach(t => popularGrid.appendChild(createCard(t)));
            }
        }

        function handleSearch() {
            currentSearchTerm = searchInput.value.trim().toLowerCase();
            clearBtn.style.display = currentSearchTerm ? 'block' : 'none';
            updateDisplay();
        }

        function clearSearch() { searchInput.value = ''; currentSearchTerm = ''; clearBtn.style.display = 'none'; updateDisplay(); }

        function handleSort() { updateDisplay(); }

        function updateDisplay() {
            let filtered = cachedTours.filter(t => t.title.toLowerCase().includes(currentSearchTerm));
            countInfo.innerText = currentSearchTerm ? `✨ 搜尋「${currentSearchTerm}」，共找到 ${filtered.length} 個行程` : `目前共有 ${filtered.length} 個行程供您選擇`;
            
            const sortType = document.getElementById('sort-select').value;
            switch (sortType) {
                case 'date-asc': filtered.sort((a, b) => a.date.localeCompare(b.date)); break;
                case 'date-desc': filtered.sort((a, b) => b.date.localeCompare(a.date)); break;
                case 'price-asc': filtered.sort((a, b) => parsePrice(a.price) - parsePrice(b.price)); break;
                case 'price-desc': filtered.sort((a, b) => parsePrice(b.price) - parsePrice(a.price)); break;
                case 'seat-asc': filtered.sort((a, b) => getRemaining(a) - getRemaining(b)); break;
                case 'seat-desc': filtered.sort((a, b) => getRemaining(b) - getRemaining(a)); break;
                case 'status': filtered.sort((a, b) => getStatusWeight(a) - getStatusWeight(b)); break;
                // 🌟 新增排序邏輯：已取消優先
                case 'cancelled-first': 
                    filtered.sort((a, b) => (a.cancel === '是' ? 0 : 1) - (b.cancel === '是' ? 0 : 1)); 
                    break;
            }

            grid.innerHTML = '';
            filtered.forEach(t => grid.appendChild(createCard(t)));
        }

        function createCard(t) {
            const card = document.createElement('div');
            card.className = 'tour-card';
            const remaining = getRemaining(t);
            const isCancelled = t.cancel === '是';
            const deadlineText = getDeadlineDisplay(t.deadline);

            let seatHtml, priceHtml, btnHtml;
            if(isCancelled) {
                seatHtml = `<span class="seat-badge seat-full">行程取消</span>`;
                priceHtml = `<div class="tour-price cancelled">${t.price} <span style="font-size:13px;">/人</span></div>`;
                // 🌟 修正：已取消按鈕使用 btn-cancelled 類別 (透明感灰)
                btnHtml = `<button class="btn-book btn-cancelled" disabled>本團已取消</button>`;
            } else {
                const badge = remaining > 5 ? 'seat-plenty' : (remaining > 0 ? 'seat-few' : 'seat-full');
                seatHtml = `<span class="seat-badge ${badge}">${remaining > 0 ? '尚餘 '+remaining+' 位' : '已額滿'}</span>`;
                priceHtml = `<div class="tour-price">${t.price} <span style="font-size:13px;color:#888;">/人</span></div>`;
                btnHtml = (remaining > 0 && deadlineText !== '報名已截止') 
                    ? `<button class="btn-book" onclick="openModal('${t.title}', '${t.date}')">點此報名</button>` 
                    : `<button class="btn-book" disabled>${deadlineText === '報名已截止' ? '報名已截止' : '本團已額滿'}</button>`;
            }

            const shareIcon = `<button class="share-btn-ios" onclick="shareTour(event, '${t.title}', '${t.date}', '${t.price}')" title="分享行程">
                <svg viewBox="0 0 24 24"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7M16 6l-4-4-4 4M12 2v13"/></svg>
            </button>`;

            card.innerHTML = `
                <div class="tour-img" style="background-image: url('${t.img || "https://drive.google.com/thumbnail?id=1JP4GeRN1CNZ-l3xox1xkbu55IZcZgNmF&sz=w1000"}');"></div>
                <div class="tour-info">
                    <h2 class="tour-title">${t.title}</h2>
                    <div class="tour-meta"><span class="tour-date">📅 ${t.date}</span>${seatHtml}</div>
                    <div class="price-row">${priceHtml}${shareIcon}</div>
                    <div class="deadline-box ${deadlineText==='報名已截止'?'expired':''}">${isCancelled ? '' : (deadlineText==='報名已截止' ? '⌛ '+deadlineText : '⏳ '+deadlineText)}</div>
                    ${btnHtml}
                </div>`;
            return card;
        }

        function getDeadlineDisplay(deadlineStr) {
            if (!deadlineStr || deadlineStr.trim() === "" || deadlineStr === "undefined") return "名額有限，報名從速";
            const end = new Date(deadlineStr);
            if (isNaN(end.getTime())) return "名額有限，報名從速";
            const diff = end - new Date();
            if (diff <= 0) return "報名已截止";
            const d = Math.floor(diff/864e5), h = Math.floor((diff%864e5)/36e5);
            return d > 0 ? `報名最後衝刺：剩 ${d} 天 ${h} 小時` : `報名即將截止：剩 ${h} 小時！`;
        }

        async function shareTour(e, title, date, price) {
            e.stopPropagation();
            const text = `【采綾遊覽團分享】\n🚌 ${title}\n📅 日期：${date}\n💰 價格：${price}/人\n👉 報名：${window.location.href}`;
            if (navigator.share) navigator.share({ title: '分享行程', text: text, url: window.location.href });
            else { navigator.clipboard.writeText(text).then(() => alert('行程資訊已複製！')); }
        }

        function parsePrice(p) { return parseFloat(p.toString().replace(/[^\d.]/g, '')) || 0; }
        function getRemaining(t) { return (parseInt(t.total)||40) - (parseInt(t.booked)||0); }
        function getStatusWeight(t) { return t.cancel === '是' ? 2 : (getRemaining(t) > 0 ? 0 : 1); }
        function openModal(t, d) {
            document.getElementById('modal-tour-name').innerText = `${t} (${d})`;
            document.getElementById('booking-frame').src = `https://docs.google.com/forms/d/e/1FAIpQLSfN4MSf6AzXIH3ftQ0G_b1W9tl_PuYj9KhHmulDaJLmQTBdOA/viewform?embedded=true&entry.1831919985=${encodeURIComponent(t)}`;
            document.getElementById('bookingModal').style.display = 'flex'; document.body.style.overflow = 'hidden';
        }
        function closeModal() { document.getElementById('bookingModal').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function openContact() { document.getElementById('contactModal').style.display = 'flex'; }
        function closeContact() { document.getElementById('contactModal').style.display = 'none'; }
    </script>
</body>
</html>
